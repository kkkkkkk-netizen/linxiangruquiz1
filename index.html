    <style>

            font-weight: bold;

            color: #2c3e50;

            font-weight: bold;
            color: #e67e22;
            padding: 0 4px;
        }

            list-style: none;
            padding: 0;
            margin: 0 0 25px 0;
        }

            background-color: rgba(248, 249, 250, 0.85);
            padding: 15px 20px;
            margin-bottom: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #e2e8f0;
            font-size: 1rem;
        }

        .option-item:hover {

            border-color: var(--accent-color);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .option-item.selected {
            background-color: #ebf5fb;
            border-color: var(--accent-color);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(41, 128, 185, 0.1);
        }

            display: block;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.05rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        .btn-submit:hover {
            background-color: #1f618d;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn-submit:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;

        .result-area {

            padding: 18px;
            border-radius: 8px;
            display: none;
        }

        .result-area.correct {
            display: block;
            background-color: rgba(212, 239, 223, 0.9);
            color: #196f3d;
            border-left: 5px solid var(--success-color);

            display: block;
            background-color: rgba(250, 219, 216, 0.9);
            color: #78281f;
            border-left: 5px solid var(--error-color);
        }

        .explanation {
            margin-top: 10px;
            font-size: 0.98rem;
            color: #4a5568;
            white-space: pre-line;
        }

        .score-summary {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

                explanation: "解析：布衣（代平民）、衣褐（代穿平民衣服）、湯鑊（代滾湯烹煮的死刑），皆屬於「以部分或相關特徵代替本體」的借代修辭。[cite: 2]"

                explanation: "解析：設問是「自問自答」，其核心效果在於吸引讀者注意力，引導讀者去思考後面給出的答案與原因。[cite: 2]"
            },
            {
                question: "【深．文意推論】在負荊請罪前，門客不理解相如的忍讓而提出辭職。這段情節在全篇結構與襯托上有何作用？",

                options: [

                ],
                correct: 2,
                explanation: "解析：相如出使前曾對趙王承諾「城不入，臣請完璧歸趙」。結局這句話，完美「照應」了相如當初的政治承諾，證明他確實保全了國家尊嚴。[cite: 2]"

    // 運行時變數與核心 JavaScript 邏輯保持不變...
    let activeQuestionSet = []; 
    let currentQuestionIndex = 0; 
    let score = 0;
    let selectedOptionIndex = null;
    let isAnswered = false;
    let userMode = "";

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const submitBtn = document.getElementById('submit-btn');
    const resultBox = document.getElementById('result-box');
    const resultStatus = document.getElementById('result-status');
    const explanationText = document.getElementById('explanation-text');
    const quizBox = document.getElementById('quiz-box');
    const summaryBox = document.getElementById('summary-box');
    const progressText = document.getElementById('progress');
    const levelTag = document.getElementById('level-tag');

    function initQuiz() {
        isAnswered = false;
        selectedOptionIndex = null;
        submitBtn.disabled = true;
        submitBtn.innerText = "確認選擇並開始";
        progressText.innerText = "【分流自評】第 1 步";
        levelTag.style.display = "none";
        questionText.innerHTML = allQuestions.routing.question.replace(/\n/g, '<br>');
        
        optionsContainer.innerHTML = '';
        allQuestions.routing.options.forEach((option, index) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            li.innerText = option;
            li.addEventListener('click', () => {
                if (isAnswered) return;
                const items = optionsContainer.querySelectorAll('.option-item');
                items.forEach(item => item.classList.remove('selected'));
                li.classList.add('selected');
                selectedOptionIndex = index;
                submitBtn.disabled = false;
            });
            optionsContainer.appendChild(li);
        });
    }

    function loadQuestion() {
        isAnswered = false;
        selectedOptionIndex = null;
        submitBtn.disabled = true;
        submitBtn.innerText = "提交答案";
        resultBox.className = "result-area";
        progressText.innerText = `題目：${currentQuestionIndex + 1} / ${activeQuestionSet.length}`;
        
        const currentData = activeQuestionSet[currentQuestionIndex];
        questionText.innerHTML = currentData.question.replace(/\n/g, '<br>');
        
        optionsContainer.innerHTML = '';
        currentData.options.forEach((option, index) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            li.innerText = option;
            li.addEventListener('click', () => selectOption(index, li));
            optionsContainer.appendChild(li);
        });
    }

    function selectOption(index, element) {
        if (isAnswered) return;
        const items = optionsContainer.querySelectorAll('.option-item');
        items.forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        selectedOptionIndex = index;
        submitBtn.disabled = false;
    }

    submitBtn.addEventListener('click', () => {
        if (userMode === "") {
            userMode = (selectedOptionIndex === 0) ? "deep" : "shallow";
            activeQuestionSet = allQuestions[userMode];
            
            levelTag.style.display = "inline-block";
            if (userMode === "deep") {
                levelTag.innerText = "組別：【深】進階挑戰";
                levelTag.style.backgroundColor = "var(--level-deep)";
            } else {
                levelTag.innerText = "組別：【淺】基礎鞏固";
                levelTag.style.backgroundColor = "var(--level-shallow)";
            }
            
            isAnswered = true;
            resultBox.className = "result-area correct";
            resultStatus.innerHTML = `<strong>🎯 分流成功！</strong> 你已選擇「${allQuestions.routing.options[selectedOptionIndex]}」。`;
            explanationText.innerText = allQuestions.routing.explanation;
            submitBtn.innerText = "開始第一題";
            return;
        }

        if (!isAnswered) {
            isAnswered = true;
            const currentData = activeQuestionSet[currentQuestionIndex];
            
            if (selectedOptionIndex === currentData.correct) {
                score++;
                resultBox.className = "result-area correct";
                resultStatus.innerHTML = "<strong>⭕ 回答正確！</strong>";
            } else {
                resultBox.className = "result-area wrong";
                resultStatus.innerHTML = `<strong>❌ 回答錯誤。</strong> 正確答案是：${currentData.options[currentData.correct]}`;
            }
            
            explanationText.innerText = currentData.explanation;
            
            if (currentQuestionIndex < activeQuestionSet.length - 1) {
                submitBtn.innerText = "下一題";
            } else {
                submitBtn.innerText = "觀看評估結果";
            }
        } else {
            if (submitBtn.innerText === "開始第一題") {
                loadQuestion();
            } else {
                currentQuestionIndex++;
                if (currentQuestionIndex < activeQuestionSet.length) {
                    loadQuestion();
                } else {
                    showSummary();
                }
            }
        }
    });

    function showSummary() {
        quizBox.style.display = 'none';
        progressText.style.display = 'none';
        levelTag.style.display = 'none';
        summaryBox.style.display = 'block';
        
        let evaluation = "";
        const rate = (score / activeQuestionSet.length) * 100;
        
        if (userMode === "deep") {
            if (rate >= 85) evaluation = "👑 卓越超群！你在【深】難度組別中表現極佳，對文言詞性活用、煉字心理及史傳結構有極深刻的洞察力！";
            else if (rate >= 60) evaluation = "👍 相當不錯！能應付大部分精細的寫作手法題，建議針對錯題對照老師筆記的「借喻與借代辨析」再行深化。";
            else evaluation = "📚 挑戰精神可嘉！【深】難度組別涉及較多抽象手法，建議先切換至【淺】難度組別穩固基本情節與字義。";
        } else {
            if (rate >= 85) evaluation = "🌟 基礎非常紮實！你在【淺】難度組別中成功通關。情節與核心語譯已無大礙，建議下次可以大膽挑戰【深】難度題目！";
            else if (rate >= 60) evaluation = "✍️ 表現尚可！故事的大致脈絡已掌握，但部分字詞（如『見』的被動或『左右』借代）仍有混淆，請加強基本功。";
            else evaluation = "📖 仍需努力！建議重新溫習課文的導讀與情節發展表，理清「完璧歸趙」與「澠池之會」的起因與結果。";
        }

        summaryBox.innerHTML = `
            <h2>🎉 分層評估挑戰完成！</h2>
            <p style="font-size:1.1rem; color:#5a6364;">評估組別：${userMode === 'deep' ? '【深】進階挑戰' : '【淺】基礎鞏固'}</p>
            <p>你的總得分：${score} / ${activeQuestionSet.length}</p>
            <p>答對率：${Math.round(rate)}%</p>
            <div style="font-size: 1.05rem; background-color: rgba(248, 249, 250, 0.9); padding: 15px; border-radius: 8px; color: #34495e; margin: 20px 0; font-weight: normal; border: 1px solid #e2e8f0; text-align: left;">
                ${evaluation}
            </div>
            <p style="font-size: 0.95rem; color: #5a6364; font-weight: normal;">「先國家之急而後私讎」，針對弱點補強，必能克敵制勝！</p>
            <button class="btn-submit" style="margin-top: 20px;" onclick="location.reload()">重新選擇組別測驗</button>
        `;
    }

    initQuiz();
</script>
